<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Pro - Liquid Glass</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .player { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            width: 380px; 
            padding: 30px; 
            border-radius: 35px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        /* EFECTO DE AGRANDAR CARÁTULA */
        .cover-art {
            width: 260px;
            height: 260px;
            margin: 0 auto 25px;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .playing { transform: scale(1.1); box-shadow: 0 0 30px rgba(255, 255, 255, 0.2); }

        .cover-art img { width: 100%; height: 100%; object-fit: cover; }

        /* CONTROLES */
        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 25px; }
        .btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .btn-play { background: #fff; color: #121212; width: 65px; height: 65px; font-size: 22px; }

        /* LISTA ESTILO SPOTIFY PRO */
        .playlist { margin-top: 20px; text-align: left; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .song-item { display: grid; grid-template-columns: 30px 1fr 50px; align-items: center; padding: 12px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .song-item:hover { background: rgba(255,255,255,0.1); }
        .index { color: #b3b3b3; }
        .song-name { display: block; font-weight: bold; }
        .song-artist { font-size: 12px; color: #b3b3b3; }
        .duration { text-align: right; color: #b3b3b3; font-size: 13px; }
        .active { color: #1db954; }
    </style>
</head>
<body>

    <div class="player">
        <div style="margin-bottom: 15px; font-weight: bold; font-size: 30px; opacity: 0.8;">White Music</div>
        
        <div class="cover-art" id="cover-box">
            <img src="portada_orgullo.jpg" id="current-cover">
        </div>

        <h2 id="title" style="margin: 0;">ORGULLO</h2>
        <p id="artist" style="color: #b3b3b3; margin-top: 5px;">Rels B</p>
        
        <audio id="audio-player"></audio>

        <div class="controls">
            <button class="btn" onclick="changeSong(-1)"><i class="fas fa-step-backward"></i></button>
            <button class="btn btn-play" onclick="playPause()" id="play-btn"><i class="fas fa-play"></i></button>
            <button class="btn" onclick="changeSong(1)"><i class="fas fa-step-forward"></i></button>
        </div>
<div style="padding: 0 20px; margin-bottom: 15px;">
    <input type="text" id="searchInput" placeholder="Buscar en tu biblioteca..." 
           style="width: 100%; padding: 12px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); 
                  background: rgba(255,255,255,0.05); color: white; backdrop-filter: blur(10px);">
</div>

<div class="playlist" id="list"></div>
        <div class="playlist" id="list"></div>
    </div>

    <script>
        const songs = [
            { title: "ORGULLO", artist: "Rels B", file: "Rels B - ORGULLO (Videoclip Oficial).mp3", img: "portada_orgullo.jpg", time: "2:37" },
            { title: "Rels B pa quererte", artist: "Rels B", file: "Rels B - pa quererte (Video Oficial).mp3", img: "portada2.jpg", time: "2:47" },
            { title: "TU VAS SIN (fav)", artist: "Rels B", file: "musica3.mp3", img: "portada_orgullo.jpg", time: "1:50" }
        ];
    
document.getElementById('searchInput').addEventListener('input', function(e) {
    const term = e.target.value.toLowerCase();
    const items = document.querySelectorAll('.song-item');

    items.forEach(item => {
        const title = item.querySelector('.song-name').innerText.toLowerCase();
        const artist = item.querySelector('.song-artist').innerText.toLowerCase();
        
        // Si coincide con título o artista, se queda; si no, desaparece
        if (title.includes(term) || artist.includes(term)) {
            item.style.display = 'grid';
        } else {
            item.style.display = 'none';
        }
    });
});
        let currentIdx = 0;
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const coverBox = document.getElementById('cover-box');

        function load(idx) {
            const s = songs[idx];
            document.getElementById('title').innerText = s.title;
            document.getElementById('artist').innerText = s.artist;
            document.getElementById('current-cover').src = s.img;
            audio.src = s.file;
            updateActive(idx);
        }

        function playPause() {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                coverBox.classList.add('playing');
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                coverBox.classList.remove('playing');
            }
        }

        function changeSong(dir) {
            currentIdx = (currentIdx + dir + songs.length) % songs.length;
            load(currentIdx);
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            coverBox.classList.add('playing');
        }

        function updateActive(idx) {
            document.querySelectorAll('.song-item').forEach((item, i) => {
                item.classList.toggle('active', i === idx);
            });
        }

        // Crear la lista automáticamente
        const listDiv = document.getElementById('list');
        songs.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'song-item';
            div.innerHTML = `
                <span class="index">${i + 1}</span>
                <div style="margin-left: 10px">
                    <span class="song-name">${s.title}</span>
                    <span class="song-artist">${s.artist}</span>
                </div>
                <span class="duration">${s.time}</span>
            `;
            div.onclick = () => { currentIdx = i; load(i); playPause(); };
            listDiv.appendChild(div);
        });

        load(0);
    </script>
</body>
</html>
