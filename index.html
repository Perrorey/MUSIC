<audio id="audio-player"></audio>
<div id="youtube-player" style="display: none;"></div>
    <script>
    let audioContext, analyzer, source, dataArray, canvas, canvasCtx;
let currentSongIndex = 0;
let isPlaying = false;

// LISTA DE CANCIONES
let songs = [
    { title: 'ORGULLO', artist: 'Rels B', img: 'portada_orgullo.jpg', file: 'Rels B - ORGULLO (Videoclip Oficial).mp3', time: '3:05' },
    { title: 'pa quererte', artist: 'Rels B', img: 'portada2.jpg', file: 'Rels B - pa quererte (Video Oficial).mp3', time: '2:47' },
    { title: 'TU VAS SIN', artist: 'Rels B', img: 'portada3.jpg', file: 'Rels B - TU VAS SIN.mp3', time: '1:50' },
    { title: 'Moscow Mule', artist: 'Bad Bunny', img: 'portada4.jpg', file: 'Bad Bunny - Moscow Mule.mp3', time: '4:05' },
    { title: 'Después de la Playa', artist: 'Bad Bunny', img: 'portada4.jpg', file: 'Bad Bunny - Después de la Playa.mp3', time: '3:50' },
    { title: 'Me Porto Bonito', artist: 'Bad Bunny', img: 'portada4.jpg', file: 'Bad Bunny & Chencho Corleone - Me Porto Bonito.mp3', time: '2:58' },
    { title: 'Tití Me Preguntó', artist: 'Bad Bunny', img: 'portada4.jpg', file: 'Bad Bunny - Tití Me Preguntó.mp3', time: '4:03' },
    { title: 'Un Ratito', artist: 'Bad Bunny', img: 'portada4.jpg', file: 'Un Ratito.mp3', time: '2:56' },
    { title: 'Yo No Soy Celoso', artist: 'Bad Bunny', img: 'portada4.jpg', file: 'Bad Bunny - Yo No Soy Celoso.mp3', time: '3:50' },
    { title: 'Tarot', artist: 'Bad Bunny', img: 'portada4.jpg', file: 'Tarot.mp3', time: '3:57' }
];

const audio = document.getElementById('audio-player');
const playBtn = document.getElementById('play-btn');

function setupVisualizer() {
    if (audioContext) {
        if (audioContext.state === 'suspended') audioContext.resume();
        return;
    }

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyzer = audioContext.createAnalyser();
    source = audioContext.createMediaElementSource(audio);
    source.connect(analyzer);
    analyzer.connect(audioContext.destination);
    
    analyzer.fftSize = 64;
    dataArray = new Uint8Array(analyzer.frequencyBinCount);
    canvas = document.getElementById('visualizer');
    canvasCtx = canvas.getContext('2d');
    draw();
}

function draw() {
    requestAnimationFrame(draw);
    analyzer.getByteFrequencyData(dataArray);
    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
    
    const barWidth = (canvas.width / dataArray.length) * 2.5;
    let x = 0;

    for(let i = 0; i < dataArray.length; i++) {
        let barHeight = dataArray[i] / 2;
        canvasCtx.fillStyle = 'rgba(255, 255, 255, 0.3)'; // Color de lujo
        canvasCtx.fillRect(x, canvas.height - barHeight, barWidth - 2, barHeight);
        x += barWidth;
    }
}

function playPause() {
    if (audio.paused) {
        setupVisualizer();
        audio.play().then(() => {
            isPlaying = true;
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        }).catch(e => console.log("Error:", e));
    } else {
        audio.pause();
        isPlaying = false;
        playBtn.innerHTML = '<i class="fas fa-play"></i>';
    }
}

function updatePlaylist() {
    const listDiv = document.getElementById('list');
    if (!listDiv) return;
    listDiv.innerHTML = '';

    songs.forEach((s, i) => {
        const div = document.createElement('div');
        
        // Clase active-song para resaltar la que suena
        div.className = `song-item ${i === currentSongIndex ? 'active-song' : ''}`;

        div.innerHTML = `
            <img src="${s.img}" alt="cover" style="width: 50px; height: 50px; border-radius: 8px; object-fit: cover;">
            <div class="song-info" style="flex: 1; text-align: left; margin-left: 15px;">
                <strong style="display: block; font-size: 14px; color: #fff;">${s.title}</strong>
                <span style="font-size: 12px; color: #b3b3b3;">${s.artist}</span>
            </div>
            <div class="song-duration" style="font-size: 12px; color: rgba(255,255,255,0.5); font-family: monospace;">${s.time}</div>
        `;

        div.onclick = () => {
            currentSongIndex = i;
            isPlaying = true;
            changeSong(0);
            updatePlaylist(); // Refresca para mover el indicador blanco
        };
        
        listDiv.appendChild(div);
    });
}

// Evento para la barra de progreso
audio.addEventListener('timeupdate', () => {
    const progress = document.getElementById('progress');
    const currentTimeEl = document.getElementById('current-time');
    const durationEl = document.getElementById('duration');
    
    if (audio.duration) {
        const percent = (audio.currentTime / audio.duration) * 100;
        progress.style.width = `${percent}%`;
        currentTimeEl.textContent = formatTime(audio.currentTime);
        durationEl.textContent = formatTime(audio.duration);
    }
});

function formatTime(s) {
    const min = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    // EVENTO PARA ADELANTAR O RETROCEDER AL HACER CLIC EN LA BARRA
const progressContainer = document.getElementById('progress-container');

progressContainer.addEventListener('click', (e) => {
    // 1. Calculamos el ancho total de la barra
    const width = progressContainer.clientWidth;
    
    // 2. Detectamos en qué punto exacto (píxel) hiciste clic
    const clickX = e.offsetX;
    
    // 3. Obtenemos la duración total de la canción actual
    const duration = audio.duration;
    
    // 4. Movemos el tiempo de la canción proporcionalmente a donde hiciste clic
    if (duration) {
        audio.currentTime = (clickX / width) * duration;
    }
});
}

// Arrancar lista al cargar
window.onload = updatePlaylist;
    updatePlaylist();
    function changeSong(step) {
    // 1. Calculamos el índice de la siguiente canción
    currentSongIndex += step;

    // Control para que al llegar al final vuelva al principio y viceversa
    if (currentSongIndex < 0) currentSongIndex = songs.length - 1;
    if (currentSongIndex >= songs.length) currentSongIndex = 0;

    const song = songs[currentSongIndex];

    // 2. Actualizamos la interfaz (Título, Artista y Portada)
    document.getElementById('title').textContent = song.title;
    document.getElementById('artist').textContent = song.artist;
    document.getElementById('current-cover').src = song.img;
    
    // 3. Actualizamos el fondo borroso dinámico
    const bg = document.getElementById('bg-dinamico');
    if (bg) bg.style.backgroundImage = `url('${song.img}')`;

    // 4. Cargamos el archivo de audio real en el reproductor
    audio.src = song.file;

    // 5. Refrescamos la lista para que se marque la canción actual en blanco
    updatePlaylist();

    // 6. Si ya estabas escuchando música, la siguiente empieza sola
    if (isPlaying) {
        audio.play().catch(e => console.log("Esperando interacción del usuario..."));
    }
}

// También asegúrate de tener esta función para que el botón de corazón funcione:
function toggleFavorite() {
    const icon = document.getElementById('heart-icon');
    const btn = document.getElementById('fav-btn');
    
    if (icon.classList.contains('fas')) {
        icon.classList.replace('fas', 'far'); // Corazón vacío
        btn.style.color = '#555'; // Color gris original
    } else {
        icon.classList.replace('far', 'fas'); // Corazón lleno
        btn.style.color = '#ff4b2b'; // Color rojo brillante
    }
}
// Función para que la barra sea interactiva
const progressContainer = document.getElementById('progress-container');

progressContainer.addEventListener('click', function(e) {
    // 1. Obtenemos el ancho total de la barra gris
    const width = this.clientWidth;
    
    // 2. Calculamos en qué punto hiciste clic (de 0 al ancho total)
    const clickX = e.offsetX;
    
    // 3. Obtenemos la duración de la canción que suena
    const duration = audio.duration;
    
    // 4. Movemos el audio a ese punto proporcional
    if (duration) {
        audio.currentTime = (clickX / width) * duration;
    }
});
// A. DETECTAR CUANDO TERMINA LA CANCIÓN
audio.addEventListener('ended', () => {
    // Llama a la función changeSong para pasar a la siguiente (1) automáticamente
    changeSong(1); 
});

// 1. REPRODUCCIÓN AUTOMÁTICA AL TERMINAR
audio.onended = () => {
    changeSong(1); 
};

// 2. HACER QUE LA BARRA SE PUEDA MOVER
// Usamos una función simple para evitar errores de duplicado
document.getElementById('progress-container').onclick = function(e) {
    const width = this.clientWidth;
    const clickX = e.offsetX;
    const duration = audio.duration;
    
    if (duration) {
        audio.currentTime = (clickX / width) * duration;
    }
};
</script>
