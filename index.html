<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHITE MUSIC - GLASS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <audio id="audio-player"></audio>


   
    <style>
      
        .player-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px); /* Esto da el efecto de vidrio esmerilado */
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.5s ease;
}
        .player {
    display: flex;
    flex-direction: column;
    align-items: center; /* Esto centra la imagen, el texto y la barra */
    justify-content: center;
    max-width: 400px;
    margin: 0 auto;
    padding: 20px;
}
  #bg-dinamico {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2; /* Se queda al fondo de todo */
    background-size: cover;
    background-position: center;
    filter: blur(60px) brightness(0.4);
    transition: background-image 1s ease-in-out;
}
#current-cover {
    width: 300px;
    height: 300px;
    object-fit: cover;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
 .progress-container {
    background: rgba(255, 255, 255, 0.1); /* Fondo gris traslúcido */
    border-radius: 10px;
    height: 6px; /* Un poco más delgada para que se vea elegante */
    width: 100%;
    cursor: pointer;
    margin-top: 20px;
}
#progress {
    transition: width 0.1s linear;
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); /* Brillo en la punta */
}

#progress {
    background: #fff; /* Blanco puro para el avance */
    height: 100%;
    border-radius: 10px;
    transition: width 0.1s linear;
}

        .song-item {
    transition: 0.3s;
    border-radius: 12px;
    padding: 10px;
    border: 1px solid transparent;
}

.song-item:hover {
    background: rgba(255, 255, 255, 0.1); /* Brillo sutil */
    border: 1px solid rgba(255, 255, 255, 0.2);
    transform: translateX(5px); /* Se mueve un poquito a la derecha */
}
        body {
    background: #0f0c29; /* Color base oscuro */
    position: relative;
    overflow: hidden;
}

/* Esferas de luz que se mueven al fondo */
body::before, body::after {
    content: '';
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: rgba(138, 43, 226, 0.4);
    filter: blur(80px);
    z-index: -1;
    animation: move 20s infinite alternate;
}

body::after {
    background: rgba(0, 212, 255, 0.3);
    right: 0;
    bottom: 0;
    animation-duration: 15s;

    from { transform: translate(-10%, -10%); }
    to { transform: translate(20%, 20%); }
}
        body { 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
   .player {
    /* Esto mantendrá todo alineado al centro */
    display: flex;
    flex-direction: column;
    align-items: center; 
    padding: 20px;
    width: 350px; /* O el ancho que estés usando */
    margin: 0 auto; /* Centra el reproductor en la pantalla */
}

.progress-container {
    width: 100%; /* Ahora sí ocupará el 100% del reproductor, no de la pantalla */
    height: 10px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    margin: 15px 0;
    cursor: pointer;
}

        /* EFECTO DE AGRANDAR CARÁTULA */
        .cover-art {
            width: 260px;
            height: 260px;
            margin: 0 auto 25px;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .playing { transform: scale(1.1); box-shadow: 0 0 30px rgba(255, 255, 255, 0.2); }

        .cover-art img { width: 100%; height: 100%; object-fit: cover; }

        /* CONTROLES */
        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 25px; }
        .btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .btn-play { background: #fff; color: #121212; width: 65px; height: 65px; font-size: 22px; }

        /* LISTA ESTILO SPOTIFY PRO */
        .playlist { margin-top: 20px; text-align: left; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .song-item { display: grid; grid-template-columns: 30px 1fr 50px; align-items: center; padding: 12px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .song-item:hover { background: rgba(255,255,255,0.1); }
        .index { color: #b3b3b3; }
        .song-name { display: block; font-weight: bold; }
        .song-artist { font-size: 12px; color: #b3b3b3; }
        .duration { text-align: right; color: #b3b3b3; font-size: 13px; }
        .active { color: #1db954; }
        .song-item {
    transition: all 0.3s ease;
    border-radius: 12px;
    padding: 8px;
}

.song-item:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: scale(1.02);
    cursor: pointer;
}

/* Para la canción que está sonando actualmente */
.active-song {
    background: rgba(255, 255, 255, 0.15);
    border-left: 4px solid #fff;
}
   /* --- BUSCA EL FINAL DE TU <style> --- */

/* Esto permite que la lista tenga scroll */
#list {
    max-height: 350px; /* Tamaño fijo para la lista */
    overflow-y: auto;  /* Activa el bajar y subir */
    padding-right: 5px;
    margin-top: 15px;
}

/* Para que la barrita de scroll sea invisible o elegante */
#list::-webkit-scrollbar {
    width: 4px;
}
#list::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.3);
    border-radius: 10px;
}

/* Asegura que el reproductor no se estire infinito */
.player {
    max-height: 95vh; 
    display: flex;
    flex-direction: column;
}
    </style>
</head>
<body>
    <div id="bg-dinamico"></div>
<div class="main-player-wrapper" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; width: 100%; color: white; font-family: sans-serif;">
    
    <div class="player-card" style="width: 380px; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
        
        <div id="cover-box" style="width: 100%; height: 320px; margin-bottom: 25px;">
            <img src="portada_orgullo.jpg" id="current-cover" style="width: 100%; height: 100%; object-fit: cover; border-radius: 15px;">
        </div>

        <div style="text-align: center; margin-bottom: 25px;">
            <h2 id="title" style="margin: 0; font-size: 24px;">ORGULLO</h2>
            <p id="artist" style="margin: 5px 0 0 0; color: #b3b3b3; font-size: 16px;">Rels B</p>
        <div style="display: flex; justify-content: center; width: 100%; margin: 10px 0;">
   <button id="fav-btn" onclick="toggleFavorite()" style="background: none; border: none; color: #555; font-size: 24px; cursor: pointer; transition: 0.3s; padding: 10px;">
    <i class="fas fa-heart" id="heart-icon"></i>
</button>
</div>
        <div style="width: 100%; margin-bottom: 25px;">
            <div id="progress-container" style="width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer;">
                <div id="progress" style="height: 100%; background: #fff; border-radius: 10px; width: 0%;"></div>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 12px; margin-top: 10px;">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls" style="display: flex; justify-content: center; align-items: center; gap: 30px; margin-bottom: 30px;">
            <button onclick="changeSong(-1)" style="background:none; border:none; color:white; font-size: 20px; cursor:pointer;"><i class="fas fa-backward"></i></button>
            <button onclick="playPause()" id="play-btn" style="width: 65px; height: 65px; border-radius: 50%; background: white; color: black; border: none; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-play"></i>
            </button>
            <button onclick="changeSong(1)" style="background:none; border:none; color:white; font-size: 20px; cursor:pointer;"><i class="fas fa-forward"></i></button>
        </div>

        <input type="text" id="searchInput" placeholder="Buscar en tu biblioteca..." style="width: 100%; padding: 12px; border-radius: 25px; border: none; background: rgba(255,255,255,0.1); color: white; margin-bottom: 20px;">
        <div id="list" class="playlist" style="max-height: 200px; overflow-y: auto;">
            </div>
    </div>
</div>

<audio id="audio-player"></audio>

    <script>
const audio = document.getElementById('audio-player');
const playBtn = document.getElementById('play-btn');
const titleEl = document.getElementById('title');
const artistEl = document.getElementById('artist');
const coverEl = document.getElementById('current-cover');
const progress = document.getElementById('progress');
const progressContainer = document.getElementById('progress-container'); // Selector para el clic
const currentTimeEl = document.getElementById('current-time');
const durationEl = document.getElementById('duration');

let currentSongIndex = 0;
let isPlaying = false;

const songs = [
    { title: 'ORGULLO', artist: 'Rels B', img: 'portada_orgullo.jpg', file: 'Rels B - ORGULLO (Videoclip Oficial).mp3', time: '3:05' },
    { title: 'pa quererte', artist: 'Rels B', img: 'portada2.jpg', file: 'Rels B - pa quererte (Video Oficial).mp3', time: '2:47' },
    { title: 'TU VAS SIN', artist: 'Rels B', img: 'portada_orgullo.jpg', file: 'musica3.mp3', time: '1:50' }
];

// 2. FUNCIÓN PARA CAMBIAR CANCIÓN
function changeSong(index) {
    if (index < 0) index = songs.length - 1;
    if (index >= songs.length) index = 0;
    
    currentSongIndex = index;
    const song = songs[currentSongIndex];

    audio.src = song.file;
    titleEl.textContent = song.title;
    artistEl.textContent = song.artist;
    coverEl.src = song.img;

    const bg = document.getElementById('bg-dinamico');
    if (bg) {
        bg.style.backgroundImage = "url('" + song.img + "')";
    }

    if (isPlaying) {
        audio.play().catch(e => console.log("Error al reproducir:", e));
    }
    
    updatePlaylist();
} // <--- ESTA LLAVE TE FALTA PARA CERRAR LA FUNCIÓN

// 3. PLAY / PAUSE (Ahora esto ya no dará error)
function playPause(){
    if (audio.src === "" || audio.src.includes('undefined')) {
        changeSong(currentSongIndex);
    }
    if (isPlaying) {
        audio.pause();
        playBtn.innerHTML = '<i class="fas fa-play"></i>';
        isPlaying = false;
    } else {
        audio.play().catch(e => console.log("Error:", e));
        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        isPlaying = true;
    }
}

// 4. LÓGICA DE LA BARRA (ACTUALIZAR Y ADELANTAR)

// Esto mueve la barra mientras suena la música
audio.addEventListener('timeupdate', () => {
    const { duration, currentTime } = audio;
    if (duration) {
        const progressPercent = (currentTime / duration) * 100;
        progress.style.width = `${progressPercent}%`;
        currentTimeEl.innerText = formatTime(currentTime);
        durationEl.innerText = formatTime(duration);
    }
});

// ESTO ES LO NUEVO: Permite hacer clic para adelantar la canción
progressContainer.addEventListener('click', (e) => {
    const width = progressContainer.clientWidth; // Ancho total de la barra
    const clickX = e.offsetX; // Donde hiciste clic
    const duration = audio.duration; // Duración total de la canción

    // Calculamos el nuevo tiempo y lo aplicamos al audio
    audio.currentTime = (clickX / width) * duration;
});

function formatTime(seconds) {
    const min = Math.floor(seconds / 60);
    const sec = Math.floor(seconds % 60);
    return `${min}:${sec < 10 ? '0' : ''}${sec}`;
}

// 5. LISTA Y BUSCADOR
function updatePlaylist() {
    const listDiv = document.getElementById('list');
    if (!listDiv) return;
    listDiv.innerHTML = '';

    songs.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'song-item';
        div.style.display = 'flex';
        div.style.justifyContent = 'space-between';
        div.style.padding = '10px';
        div.style.cursor = 'pointer';
        
        div.innerHTML = `
            <div>
                <span style="font-weight:bold; display:block;">${s.title}</span>
                <span style="font-size:12px; color:#b3b3b3;">${s.artist}</span>
            </div>
            <span style="color:#b3b3b3;">${s.time}</span>
        `;

        div.onclick = () => {
            isPlaying = true;
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            changeSong(i);
        };
        listDiv.appendChild(div);
    });
}
audio.addEventListener('ended', () => {
    changeSong(1); // Cuando acaba, llama a la función de cambiar canción hacia adelante
});
// Inicializar
updatePlaylist();
</script> 
</body>
</html>
